# openspec/config.yaml — landingtyp
# SDD configuration for the Tamara & Piñeros law-firm landing page.
# Generated by sdd-init on 2026-06-24.

schema: spec-driven

context: |
  Tech stack: Static HTML5 + vanilla CSS + vanilla JS (IIFE, 'use strict', var-based, data-* bindings).
  No build tooling, no bundler, no framework, no package.json.
  Architecture: Static landing with deployable files under public/ (HTML, CSS, JS, images, redirects, robots, sitemap).
  Deploy: Netlify static site (netlify.toml publish="public", public/_redirects, security/cache headers, Netlify Forms via AJAX).
  Content language: Spanish (Colombian law firm, Villavicencio). SDD meta-artifacts in English.
  Testing: None — no test runner, no test files. strict_tdd: false.
  Reference material: design/ contains handoff kits, internal guides, archived assets, and visual backups.
  Local tools: tools/ contains repository-local verification scripts.
  Git: Git repository.

rules:
  proposal:
    - Include rollback plan for risky changes (static site: rollback = redeploy prior commit/file set)
    - Note Netlify deploy implications for any change
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Scope requirements to user-visible behavior (no backend; form = Netlify Forms)
  design:
    - Document any change to IIFE structure or data-* binding conventions
    - Keep JS dependency-free; no frameworks or bundlers introduced without explicit decision
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Each task lists exact files touched (index.html, styles.css, script.js, assets)
  apply:
    - Follow existing code patterns: IIFE, 'use strict', var, data-* attributes
    - Preserve Spanish (Colombian) user-facing copy; SDD artifacts stay English
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
    # Static site: verify via manual checklist, link/SEO audit, and Netlify preview deploy
    manual_verification: true
  archive:
    - Warn before merging destructive deltas
    - Confirm Netlify deploy state before archiving a change
